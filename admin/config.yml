# Konfigurasi Backend (Murni GitHub)
backend:
  name: github
  repo: ryanfauzi-TIK/web-tik-vokasi
  branch: main
  base_url: https://auth.decapcms.org # Menggunakan gateway komunitas gratis khusus GitHub Pages

# Pengaturan Media & Upload Gambar
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# Struktur Konten Website (Silakan sesuaikan dengan kebutuhan web Abang)
collections:
  - name: "berita"
    label: "Berita & Pengumuman"
    folder: "_posts/berita"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Judul Berita", name: "title", widget: "string" }
      - { label: "Tanggal Publish", name: "date", widget: "datetime" }
      - { label: "Gambar Utama", name: "image", widget: "image", required: false }
      - { label: "Isi Berita", name: "body", widget: "markdown" }

  - name: "dosen"
    label: "Daftar Dosen"
    folder: "_data/dosen"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Lengkap", name: "name", widget: "string" }
      - { label: "NIDN / NIP", name: "nidn", widget: "string" }
      - { label: "Jabatan", name: "position", widget: "string" }
      - { label: "Foto", name: "image", widget: "image", required: false }

  - name: "fasilitas"
    label: "Fasilitas Kampus"
    folder: "_data/fasilitas"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Fasilitas", name: "title", widget: "string" }
      - { label: "Deskripsi", name: "description", widget: "text" }
      - { label: "Foto Fasilitas", name: "image", widget: "image", required: false }
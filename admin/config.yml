backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "images/uploads"

collections:
  - name: "halaman_berita"
    label: "Berita"
    files:
      - label: "Daftar Berita"
        name: "berita"
        file: "data/berita.json" # Semua berita akan disatukan di file ini
        fields:
          - label: "Kumpulan Berita"
            name: "items"
            widget: "list"
            fields:
              - {label: "Judul Berita", name: "title", widget: "string"}
              - {label: "Tanggal", name: "date", widget: "datetime"}
              - {label: "Gambar Thumbnail", name: "thumbnail", widget: "image"}
              - {label: "Deskripsi Singkat", name: "description", widget: "text"}
              - {label: "Isi Berita Lengkap", name: "body", widget: "markdown"}
              - name: "fasilitas"
    label: "Data Fasilitas (Lab)"
    file: "data/fasilitas.json" # File ini yang akan menyimpan datanya
    extension: "json"
    format: "json"
    fields:
      - name: "items"
        label: "Daftar Fasilitas"
        widget: "list"
        fields:
          - {label: "Nama Fasilitas/Lab", name: "nama", widget: "string"}
          - {label: "Foto Fasilitas", name: "gambar", widget: "image"}

  - name: "dosen"
    label: "Data Dosen"
    file: "data/dosen.json" # File ini yang akan menyimpan datanya
    extension: "json"
    format: "json"
    fields:
      - name: "items"
        label: "Daftar Dosen"
        widget: "list"
        fields:
          - {label: "Nama Beserta Gelar", name: "nama", widget: "string"}
          - {label: "Jabatan", name: "jabatan", widget: "string"}
          - {label: "Foto Dosen", name: "foto", widget: "image"}